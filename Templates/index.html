<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="MatbD6csCo_RX8zzYBPbsnmw5VbQTZQyB4R8fhVIirY" />
    <title>Aura Scale | BMI Calculator</title>
    <style>
        :root {
            --bg-color: #0d0f17;
            --panel-bg: rgba(20, 24, 38, 0.8);
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-glow: rgba(0, 240, 255, 0.25);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 60px 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0px 10px 30px var(--border-glow);
            backdrop-filter: blur(12px);
            position: relative;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 35px;
            font-size: 26px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(10, 11, 18, 0.6);
            border: 1px solid #2d3748;
            border-radius: 8px;
            box-sizing: border-box;
            color: var(--neon-cyan);
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0, 240, 255, 0.2));
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--neon-cyan);
            color: #0d0f17;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.7);
        }

        /* Redesigned Result Section - No more harsh box! */
        .result-display {
            margin-top: 40px;
            text-align: center;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 30px;
        }

        .bmi-number {
            font-size: 18px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .bmi-number span {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            margin-left: 5px;
        }

        .status-title {
            font-size: 14px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            margin-bottom: 2px;
        }

        .status-badge {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            margin: 5px 0;
        }

        .status-message {
            font-size: 16px;
            color: var(--text-main);
            opacity: 0.9;
        }
        /* Dynamic dial variables */
        :root {
            --dial-angle: 0deg;
            --dial-color: var(--neon-cyan);
        }

        .cyber-dial-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }

        .cyber-dial {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(
                var(--dial-color) var(--dial-angle),
                rgba(255, 255, 255, 0.05) var(--dial-angle)
            );
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dial-inner {
            width: 150px;
            height: 150px;
            background-color: #111422;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        #bmiDisplay {
            font-size: 36px;
            font-weight: 800;
            color: #ffffff;
        }

        .cyber-dial-container .label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="height_unit">Height Unit</label>
            <select id="height_unit" name="height_unit" onchange="toggleHeightFields()">
                <option value="ft">Imperial (Feet / Inches)</option>
                <option value="cm">Metric (Centimeters)</option>
            </select>
        </div>

        <div id="ft_inputs" class="form-group">
            <label>Height Values</label>
            <div style="display: flex; gap: 12px;">
                <input type="number" name="ft" placeholder="Feet" min="0">
                <input type="number" name="inch" placeholder="Inches" min="0" max="11">
            </div>
        </div>

        <div id="cm_input" class="form-group" style="display: none;">
            <label for="cm">Height Value</label>
            <input type="number" id="cm" name="cm" placeholder="cm" min="0">
        </div>

        <div class="form-group">
            <label for="weight_unit">Weight Unit</label>
            <select name="weight_unit">
                <option value="kg">Metric (Kilograms)</option>
                <option value="lbs">Imperial (Pounds)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="weight">Weight Value</label>
            <input type="number" step="any" name="weight" required placeholder="0.0" min="0">
        </div>

        <button type="submit">Calculate BMI</button>
    </form>

    {% if bmi %}
    <div class="result-display">
        <div class="cyber-dial-container">
            <div class="cyber-dial" id="bmiDial">
                <div class="dial-inner">
                    <span id="bmiDisplay">{{ bmi|floatformat:1 }}</span>
                    <span class="label">BMI</span>
                </div>
            </div>
        </div>

        <div class="status-title">Current Status</div>
        <div class="status-badge" id="statusBadge">{{ category|upper }}</div>

        <div class="status-message">
            <span id="dynamicFeedback"></span>
        </div>
    </div>
    {% endif %}
        </div>
    </div>
    {% endif %}
</div>

<script>
    function toggleHeightFields()
    window.addEventListener('DOMContentLoaded', () => {
        // Fetch values safely injected by Django (defaulting to 0 if not calculated yet)
        const bmi = parseFloat("{{ bmi|default:0 }}");
        const category = "{{ category|default:'' }}".toLowerCase();

        // Grab elements we need to manipulate
        const dial = document.getElementById('bmiDial');
        const display = document.getElementById('bmiDisplay');
        const feedbackContainer = document.getElementById('dynamicFeedback');
        const badge = document.getElementById('statusBadge');

        // Exit out early if no calculation has occurred yet
        if (!bmi || !dial) return;

        // 1. CHOOSE THE NEON COLOR MATRICES BASED ON STATUS
        let colorHex = "var(--neon-cyan)";
        let evaluationText = "";

        if (category.includes("underweight")) {
            colorHex = "#00f0ff"; // Ice Blue
            badge.style.color = colorHex;
            badge.style.textShadow = `0 0 20px ${colorHex}`;
            evaluationText = "SYSTEM // UNDERWEIGHT ALERT: Mass configuration below nominal thresholds. Target calibration indicates a surplus intake protocol required to reach a normal baseline distribution.";
        } else if (category.includes("normal")) {
            colorHex = "#39ff14"; // Neon Green
            badge.style.color = colorHex;
            badge.style.textShadow = `0 0 20px ${colorHex}`;
            evaluationText = "SYSTEM OPTIMAL: Structural matrix verified. Maintenance routine authorized. Parameters sitting safely within expected operational baselines.";
        } else if (category.includes("overweight")) {
            colorHex = "var(--neon-magenta)"; // Neon Magenta
            badge.style.color = colorHex;
            badge.style.textShadow = `0 0 20px ${colorHex}`;
            evaluationText = "WARNING // OVERWEIGHT DETECTION: Target metrics read slightly above baseline guidelines. Actionable recommendation: caloric optimization and expenditure adjustments to drop down to normal tracking bounds.";
        } else if (category.includes("obese")) {
            colorHex = "#ff3131"; // Neon Red
            badge.style.color = colorHex;
            badge.style.textShadow = `0 0 20px ${colorHex}`;
            evaluationText = "CRITICAL // SIGNAL ALERT: Mass accumulation has breached nominal limits. Remedial lifestyle intervention or expert consultation flagged for structural health recovery parameters.";
        }


        feedbackContainer.innerText = evaluationText;


        let percent = (bmi - 15) / (40 - 15);
        percent = Math.min(Math.max(percent, 0), 1); // Stay between 0% and 100%
        const degrees = percent * 360

        /
        dial.style.setProperty('--dial-angle', `${degrees}deg`);
        dial.style.setProperty('--dial-color', colorHex);
        dial.style.boxShadow = `0 0 25px ${colorHex}`;
        if(display) {
            display.style.textShadow = `0 0 15px ${colorHex}`;
        }
    }); {
        const unit = document.getElementById('height_unit').value;
        const ftInputs = document.getElementById('ft_inputs');
        const cmInput = document.getElementById('cm_input');

        if (unit === 'ft') {
            ftInputs.style.display = 'block';
            cmInput.style.display = 'none';
        } else {
            ftInputs.style.display = 'none';
            cmInput.style.display = 'block';
        }
    }
</script>

</body>
</html>
